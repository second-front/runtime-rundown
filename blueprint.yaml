---
apiVersion: v1
kind: Namespace
metadata:
  name: runtime-rundown
  labels:
    kustomize.toolkit.fluxcd.io/prune: disabled
    istio-injection: enabled
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: runtime-rundown-blueprint
  namespace: runtime-rundown
spec:
  interval: 1m
  ref:
    tag: main
  url: oci://172.30.1.2:5000/library/runtime-rundown
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: runtime-rundown-blueprint
  namespace: runtime-rundown
spec:
  interval: 10m
  path: ./
  prune: true
  wait: false
  sourceRef:
    kind: OCIRepository
    name: runtime-rundown-blueprint
