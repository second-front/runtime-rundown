---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname runtime-rundown
  namespace: runtime-rundown
spec:
  targetNamespace: runtime-rundown
  commonMetadata:
    labels:
      app.kubernetes.io/name: *appname
  path: "./runtime-rundown/app"
  components:
    - ./index/${SECURITY_LEVEL}/${RUNTIME_ENVIRONMENT}
  ignoreMissingComponents: true
  prune: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: runtime-rundown-blueprint
    namespace: runtime-rundown
  wait: true
  # The blueprint Kustomization resolves ${SECURITY_LEVEL} and ${RUNTIME_ENVIRONMENT} before
  # applying this manifest to the cluster, so the child Kustomization always sees literal values.
  # In production, the kustomize mutating webhook populates these on every Kustomization automatically.
  postBuild:
    substitute:
      SECURITY_LEVEL: "${SECURITY_LEVEL}"
      RUNTIME_ENVIRONMENT: "${RUNTIME_ENVIRONMENT}"