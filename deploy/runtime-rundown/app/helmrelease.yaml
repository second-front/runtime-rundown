apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: runtime-rundown
  namespace: runtime-rundown
spec:
  interval: 5m
  targetNamespace: runtime-rundown
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  chartRef:
    kind: OCIRepository
    name: runtime-rundown
    namespace: runtime-rundown

  # Put chart values here if you need overrides; leaving empty uses chart defaults.
  values:
    image:
      repository: ghcr.io/ro11net/runtime-rundown
      pullPolicy: IfNotPresent
      tag: latest
    postgres:
      enabled: true
    app:
      securityLevel: ${SECURITY_LEVEL}
      message: "Welcome to Flux Training!"
    securityContext: {}
    resources:
      requests:
        memory: "32Ki"
        cpu: "1m"
      limits:
        memory: "64Mi"
        cpu: "50m"
