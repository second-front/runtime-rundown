apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: runtime-rundown
  namespace: runtime-rundown
spec:
  interval: 5m
  targetNamespace: runtime-rundown
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  chartRef:
    kind: OCIRepository
    name: runtime-rundown
    namespace: runtime-rundown

  values:
    image:
      repository: ghcr.io/ro11net/runtime-rundown
      pullPolicy: IfNotPresent
      tag: latest
    postgres:
      enabled: false
    app:
      securityLevel: ${SECURITY_LEVEL}
      message: "Welcome to Flux Training!"
      externalDatabase:
        enabled: true
        existingSecret: "runtime-rundown-app"
        secretKeys:
          host: "host"
          port: "port"
          database: "dbname"
          username: "username"
          password: "password"
    securityContext: {}
    resources:
      requests:
        memory: "32Ki"
        cpu: "1m"
      limits:
        memory: "64Mi"
        cpu: "50m"
