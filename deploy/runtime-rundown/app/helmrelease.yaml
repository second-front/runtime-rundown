apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: runtime-rundown
  namespace: runtime-rundown
spec:
  interval: 5m
  targetNamespace: runtime-rundown
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chartRef:
    kind: OCIRepository
    name: runtime-rundown
    namespace: runtime-rundown
  values:
    image:
      repository: ghcr.io/ro11net/runtime-rundown
      pullPolicy: IfNotPresent
      tag: latest
    postgres:
      enabled: true
    app:
      securityLevel: "LOW"
      message: "Welcome to Flux Training!"
